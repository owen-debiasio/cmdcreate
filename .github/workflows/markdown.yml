name: Markdown Lint

on:
  push:
    paths:
      - "**/*.md"
      - "**/*.yml"
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.yml"

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Prettier
        run: npm install -g prettier

      - name: Run Prettier
        run: prettier -c "**/*.md" "**/*.yml"

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2@0.13.0

      - name: Run markdownlint
        run: markdownlint-cli2 "**/*.md" "**/*.yml" --config .markdownlint.json
