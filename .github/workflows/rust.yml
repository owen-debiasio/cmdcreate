name: Rust Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-unknown-linux-musl, i686-unknown-linux-musl

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (x86_64)
        run: |
          CRATE_CC_NO_DEFAULTS=true \
          CC_x86_64_unknown_linux_musl="zig cc -target x86_64-linux-musl" \
          cargo clippy --target x86_64-unknown-linux-musl --all-targets --all-features

      - name: Clippy (i686)
        run: |
          CRATE_CC_NO_DEFAULTS=true \
          CC_i686_unknown_linux_musl="zig cc -target x86-linux-musl" \
          cargo clippy --target i686-unknown-linux-musl --all-targets --all-features

      - name: Build (x86_64 release)
        run: |
          CRATE_CC_NO_DEFAULTS=true \
          CC_x86_64_unknown_linux_musl="zig cc -target x86_64-linux-musl" \
          cargo build --release --target x86_64-unknown-linux-musl

      - name: Build (i686 release)
        run: |
          CRATE_CC_NO_DEFAULTS=true \
          CC_i686_unknown_linux_musl="zig cc -target x86-linux-musl" \
          cargo build --release --target i686-unknown-linux-musl

      - name: Run tests
        run: cargo test
