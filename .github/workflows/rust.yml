name: Rust Lint

on:
  push:
    branches: [main]
    paths:
      - "**.rs"
      - "**/.github/workflows/rust.yml"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
  pull_request:
    branches: [main]
    paths:
      - "**.rs"
      - "**/.github/workflows/rust.yml"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: |
            x86_64-unknown-linux-musl
            i686-unknown-linux-musl
            aarch64-unknown-linux-musl
            armv7-unknown-linux-musleabihf

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          use-cache: true

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (x86_64)
        run: |
          CRATE_CC_NO_DEFAULTS=true \
          CC_x86_64_unknown_linux_musl="zig cc -target x86_64-linux-musl" \
          cargo clippy --target x86_64-unknown-linux-musl --all-targets --all-features

      - name: Clippy (i686)
        run: |
          CRATE_CC_NO_DEFAULTS=true \
          CC_i686_unknown_linux_musl="zig cc -target x86-linux-musl" \
          cargo clippy --target i686-unknown-linux-musl --all-targets --all-features

      - name: Clippy (aarch64)
        run: |
          CRATE_CC_NO_DEFAULTS=true \
          CC_aarch64_unknown_linux_musl="zig cc -target aarch64-linux-musl" \
          cargo clippy --target aarch64-unknown-linux-musl --all-targets --all-features

      - name: Clippy (armv7)
        run: |
          CRATE_CC_NO_DEFAULTS=true \
          CC_armv7_unknown_linux_musleabihf="zig cc -target arm-linux-musleabihf" \
          cargo clippy --target armv7-unknown-linux-musleabihf --all-targets --all-features

      - name: Build (x86_64 release)
        run: |
          RUSTFLAGS="-C target-feature=+crt-static" \
          cargo zigbuild --release --target x86_64-unknown-linux-musl

      - name: Build (i686 release)
        run: |
          RUSTFLAGS="-C target-feature=+crt-static" \
          cargo zigbuild --release --target i686-unknown-linux-musl

      - name: Build (aarch64 release)
        run: |
          RUSTFLAGS="-C target-feature=+crt-static" \
          cargo zigbuild --release --target aarch64-unknown-linux-musl

      - name: Build (armv7 release)
        run: |
          RUSTFLAGS="-C target-feature=+crt-static" \
          cargo zigbuild --release --target armv7-unknown-linux-musleabihf

      - name: Run tests
        # I'm skipping the tests `created_command_runs` and `renamed_command_runs` because
        # Something with the PATH doesn't work in workflows or something.background.

        # Tests involving importing/exporting have do be dealt with individually to avoid conflicts.
        run: |
          cargo test --release -- --no-capture --skip created_command_runs --skip renamed_command_runs --skip imported_commands_run_correctly
          cargo test --release export_file_contains_command_with_contents -- --ignored
          cargo test --release export_file_is_created -- --ignored
          cargo test --release imported_commands_are_located_in_install_dir -- --ignored
