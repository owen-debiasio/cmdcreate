name: Rust Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

  # Essential for crates with C dependencies (like ring) when cross-compiling

  CC: "zig cc"
  CXX: "zig c++"
  AR: "zig ar"

  # Ensures warnings fail CI and forces static linking for musl

  RUSTFLAGS: "-Dwarnings -C target-feature=+crt-static"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: |
            x86_64-unknown-linux-musl
            i686-unknown-linux-musl
            aarch64-unknown-linux-musl
            armv7-unknown-linux-musleabihf

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (x86_64)
        run:
          cargo clippy --target x86_64-unknown-linux-musl --all-targets
          --all-features

      - name: Clippy (i686)
        run:
          cargo clippy --target i686-unknown-linux-musl --all-targets
          --all-features

      - name: Clippy (aarch64)
        run:
          cargo clippy --target aarch64-unknown-linux-musl --all-targets
          --all-features

      - name: Clippy (armv7)
        run:
          cargo clippy --target armv7-unknown-linux-musleabihf --all-targets
          --all-features

      - name: Build (x86_64 release)
        run: cargo zigbuild --release --target x86_64-unknown-linux-musl

      - name: Build (i686 release)
        run: cargo zigbuild --release --target i686-unknown-linux-musl

      - name: Build (aarch64 release)
        run: cargo zigbuild --release --target aarch64-unknown-linux-musl

      - name: Build (armv7 release)
        run: cargo zigbuild --release --target armv7-unknown-linux-musleabihf

      - name: Run tests
        run: cargo test
