name: Rust Lint

on:
  push:
    branches: [main]
    paths:
      - "**.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "**/.cargo/config.toml"
  pull_request:
    branches: [main]
    paths:
      - "**.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "**/.cargo/config.toml"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust and Targets
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-unknown-linux-musl, i686-unknown-linux-musl

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (x86_64)
        run:
          cargo clippy --target x86_64-unknown-linux-musl --all-targets
          --all-features

      - name: Clippy (i686)
        run:
          cargo clippy --target i686-unknown-linux-musl --all-targets
          --all-features

      - name: Build (x86_64 release)
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Build (i686 release)
        run: cargo build --release --target i686-unknown-linux-musl

      - name: Run tests
        run: cargo test
