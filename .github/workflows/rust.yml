name: Rust Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: |
            x86_64-unknown-linux-musl
            i686-unknown-linux-musl
            aarch64-unknown-linux-musl
            armv7-unknown-linux-musleabihf

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (All Targets)
        env:
          CC: "zig cc"
          AR: "zig ar"
        run: |
          cargo clippy --target x86_64-unknown-linux-musl --all-targets --all-features
          cargo clippy --target i686-unknown-linux-musl --all-targets --all-features
          cargo clippy --target aarch64-unknown-linux-musl --all-targets --all-features
          cargo clippy --target armv7-unknown-linux-musleabihf --all-targets --all-features

      - name: Build All Architectures
        env:
          CC: "zig cc"
          AR: "zig ar"
          RUSTFLAGS: "-Dwarnings -C target-feature=+crt-static"
        run: |
          cargo zigbuild --release --target x86_64-unknown-linux-musl
          cargo zigbuild --release --target i686-unknown-linux-musl
          cargo zigbuild --release --target aarch64-unknown-linux-musl
          cargo zigbuild --release --target armv7-unknown-linux-musleabihf

      - name: Run tests
        run: cargo test
