[target.i686-unknown-linux-musl]
linker = "rust-lld"
rustflags = [
    "-C", "target-feature=+crt-static",
    "-C", "link-arg=-fuse-ld=lld",
    "-C", "relocation-model=static",
]

[target.x86_64-unknown-linux-musl]
linker = "rust-lld"
rustflags = [
    "-C", "target-feature=+crt-static",
    "-C", "relocation-model=static",
]
